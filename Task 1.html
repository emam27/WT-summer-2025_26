<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Internship Confirmation Form</title>

</head>

<body>

    <h1>Internship Confirmation Form</h1>

    <p>

        Please fill out the form below 

    </p>

    <form action="#" method="post">

        <label for="studentName">Student Name:</label><br>

        <input 

            type="text" 

            id="studentName" 

            name="studentName" 

            required

        >

        <br><br>

        <label for="email">Email Address:</label><br>

        <input 

            type="email" 

            id="email" 

            name="email" 

            required

        >

        <br><br>

        <p>Preferred Internship Type:</p>

        <input 

            type="radio" 

            id="onsite" 

            name="internshipType" 

            value="On-Site"

        >

        <label for="onsite">On-Site</label>

   

        <input 

            type="radio" 

            id="remote" 

            name="internshipType" 

            value="Remote"

        >

        <label for="remote">Remote</label>

        <br><br>

        <label for="duration">Internship Duration:</label><br>

        <select id="duration" name="duration">

            <option value="6 Weeks">6 Weeks</option>

            <option value="3 Months">3 Months</option>

        </select>

        <br><br>

        <p>Skills of Interest:</p>

        <input 

            type="checkbox" 

            id="webDevelopment" 

            name="skills" 

            value="Web Development"

        >

        <label for="webDevelopment">Web Development</label>

        <br>

        <input 

            type="checkbox" 

            id="dataAnalysis" 

            name="skills" 

            value="Data Analysis"

        >

        <label for="dataAnalysis">Data Analysis</label>

        <br>

        <input 

            type="checkbox" 

            id="mobileApps" 

            name="skills" 

            value="Mobile Apps"

        >

        <label for="mobileApps">Mobile Apps</label>

        <br><br>

        <input type="submit" value="Submit">

    </form>

</body>

</html>
